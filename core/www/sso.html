<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in...</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; color: #4b5563; }
  </style>
</head>
<body>
  <p id="status">Signing in...</p>
  <script>
    (function() {
      var env = {{ env | tojson }};
      var LOGIN_URL = {{ login_url | tojson }};
      var DESK_URL = {{ desk_url | tojson }};
      var REDIRECT_TO_FROM_QS = {{ redirect_to | tojson }};
      var SSO_USER = "";
      var SSO_PWD = "";
      if (env === "DEV") {
        SSO_USER = "devSsoUsr";
        SSO_PWD = "devSsoPwd";
      } else if (env === "QA") {
        SSO_USER = "qaSsoUsr";
        SSO_PWD = "qaSsoPwd";
      } else if (env === "PROD") {
        SSO_USER = "prodSsoUsr";
        SSO_PWD = "prodSsoPwd";
      } else {
        document.getElementById("status").textContent =
          "Invalid or missing env in site_config.json (expected DEV, QA, or PROD).";
        document.getElementById("status").style.color = "#b91c1c";
        return;
      }
      var redirectTo = (REDIRECT_TO_FROM_QS && String(REDIRECT_TO_FROM_QS).trim()) || "dashboard";
      function buildLoginUrl() {
        if (LOGIN_URL) return LOGIN_URL;
        return '/login?redirect-to=' + encodeURIComponent(redirectTo);
      }
      function buildPostLoginUrl() {
        return DESK_URL || redirectTo;
      }
      function getCookies() {
        var cookies = {};
        document.cookie.split('; ').forEach(function(part) {
          var eq = part.indexOf('=');
          if (eq !== -1) cookies[part.slice(0, eq)] = decodeURIComponent(part.slice(eq + 1).trim());
        });
        return cookies;
      }
      function clearCookies() {
        var past = 'Thu, 01 Jan 1970 00:00:00 GMT';
        document.cookie = SSO_USER + '=; expires=' + past;
        document.cookie = SSO_PWD + '=; expires=' + past;
      }
      var c = getCookies();
      var usr = c[SSO_USER];
      var pwd = c[SSO_PWD];
      if (!usr || !pwd) {
        window.location.replace(buildLoginUrl());
        return;
      }
      usr = atob(usr);
      pwd = atob(pwd);
      var body = new URLSearchParams({ usr: usr, pwd: pwd });
      fetch('/api/method/login', { method: 'POST', body: body, credentials: 'same-origin', headers: { 'Content-Type': 'application/x-www-form-urlencoded' } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.message === 'Logged In' || data.message === 'No App') {
            clearCookies();
            window.location.replace(buildPostLoginUrl());
          } else {
            document.getElementById('status').textContent = 'Invalid credentials. Redirecting...';
            setTimeout(function() { window.location.replace(buildLoginUrl()); }, 1500);
          }
        })
        .catch(function() {
          document.getElementById('status').textContent = 'Invalid credentials. Redirecting...';
          setTimeout(function() { window.location.replace(buildLoginUrl()); }, 1500);
        });
    })();
  </script>
</body>
</html>
